<!DOCTYPE html>
<html>
<head>
<title>Islamic Hub</title>

<style>
body {
    font-family: Arial;
    background: #f4f6fb;
    padding: 20px;
}

h1 {
    text-align: center;
    color: #1e3c72;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
    gap: 20px;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    cursor: pointer;
    box-shadow: 0px 5px 15px rgba(0,0,0,0.05);
}

.card:hover {
    transform: scale(1.05);
}

button {
    margin-top: 20px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #2a5298;
    color: white;
}
</style>
</head>

<body>

<h1>🕌 Islamic Hub</h1>

<div class="grid">

<div class="card" onclick="go('salah.html')">
<h2>🕰️ Salah Times</h2>
<p>Check daily prayer times</p>
</div>

<div class="card" onclick="go('qiblah.html')">
<h2>🧭 Qiblah Compass</h2>
<p>Find direction of the Ka'bah</p>
</div>

<div class="card" onclick="go('hadith.html')">
<h2>📚 Hadith Search</h2>
<p>Search authentic hadith</p>
</div>

<div class="card" onclick="go('quran.html')">
<h2>📖 Quran</h2>
<p>Read Quran anytime</p>
</div>

<div class="card" onclick="go('dua.html')">
<h2>🤲 Daily Duas</h2>
<p>Essential duas for everyday</p>
</div>

</div>

<br><br>

<button onclick="goHome()">🏠 Home</button>

<script>
function go(page){
    window.location.href = page;
}

function goHome(){
    window.location.href = "index.html";
}
</script>

</body>
</html>
